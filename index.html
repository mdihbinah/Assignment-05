<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | Login</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">

    <!-- Tailwind and daisy ui cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awasome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <style>
        *{
            font-family: "Outfit", sans-serif;
        }
    </style>

</head>
<body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <div class="logo w-[250px] mx-auto pt-32 flex flex-col justify-center items-center space-y-2">
        <img src="assets/github-logo.png" alt="">
        <h3>GitHub Issues Tracker</h2>
        <h4 class="opacity-60">Sign in to manage your issues</h3>
    </div>
    <div class="form pt-10 mx-auto">
        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-xl mx-auto">
            <div class="card-body">
                <fieldset class="fieldset">
                <label class="label text-neutral font-bold">Username</label>
                <input id="username" maxlength="11" minlength="11" type="email" class="input rounded-full bg-base-200" value="admin" placeholder="Enter your Username" />
                <br>
                <label class="label text-neutral font-bold">Password</label>
                <input id="pin-number" maxlength="8" type="password" class="input rounded-full bg-base-200" value="admin123" placeholder="Enter Password" />
                <button id="login" class="btn btn-neutral mt-4 rounded-full">Login</button>
                </fieldset>
            </div>
        </div>
    </div>

    <!-- <script src="script/login.js"></script> -->
    <script src="script/login.js"></script>
</body>
</html>
